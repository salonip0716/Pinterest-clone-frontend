<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pinspire – Discover Your World</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <a href="#" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" fill="#E60023"/>
          <path d="M17.5 26c-.6 2.4-1.4 4.7-3.7 5.9-.1-.7-.1-1.3 0-2l1.8-7.6c-.5-.9-.7-2-.5-3.2.5-2.5 2.8-4.4 5-4.4 2.3 0 3.5 1.7 3.5 3.8 0 2.9-1.8 7-2.7 9.2-.8 1.9 1.5 3.4 3 2.1 3.3-3 4.5-9.1 2.3-13.5C24.1 13 19.7 11 15.5 12.5 11 14 8.5 18.8 9.5 23.5c.3 1.2.9 2.3 1.8 3 .2.2.3.1.3-.2.2-.7.5-2 .6-2.3.1-.3 0-.5-.2-.8-.7-1.6-.9-3.5-.2-5.4 1.4-4.3 6-6.7 10.1-5.5 3.7 1.1 5.4 4.6 4.4 8.1-.7 2.3-2.1 4.5-4.4 4.5-1.3 0-2.5-.8-2.5-2.1 0-.1.1-.4.1-.6z" fill="white"/>
        </svg>
        <span class="logo-text">Pinspire</span>
      </a>
    </div>

    <div class="nav-center">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Explore</a>
      <a href="#" class="nav-link">Following</a>
    </div>

    <div class="nav-search">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" class="search-input" placeholder="Search for ideas…" id="searchInput"/>
        <button class="search-clear" id="searchClear"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>

    <div class="nav-right">
      <button class="icon-btn" title="Notifications" id="notifBtn">
        <i class="fa-regular fa-bell"></i>
        <span class="badge">3</span>
      </button>
      <button class="icon-btn" title="Messages">
        <i class="fa-regular fa-comment-dots"></i>
      </button>
      <button class="create-btn" id="openCreateModal">
        <i class="fa-solid fa-plus"></i> Create
      </button>
      <div class="avatar-wrap" id="avatarMenu">
        <img src="https://i.pravatar.cc/40?img=47" alt="Profile" class="avatar"/>
        <div class="dropdown-menu" id="profileDropdown">
          <a href="#"><i class="fa-regular fa-user"></i> Your Profile</a>
          <a href="#"><i class="fa-regular fa-bookmark"></i> Saved</a>
          <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
          <hr/>
          <a href="#"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log out</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== CATEGORY PILLS ===== -->
  <div class="category-bar">
    <div class="categories" id="categories">
      <button class="cat-pill active" data-cat="all">All</button>
      <button class="cat-pill" data-cat="art">Art</button>
      <button class="cat-pill" data-cat="architecture">Architecture</button>
      <button class="cat-pill" data-cat="travel">Travel</button>
      <button class="cat-pill" data-cat="food">Food</button>
      <button class="cat-pill" data-cat="fashion">Fashion</button>
      <button class="cat-pill" data-cat="nature">Nature</button>
      <button class="cat-pill" data-cat="interior">Interior</button>
      <button class="cat-pill" data-cat="photography">Photography</button>
      <button class="cat-pill" data-cat="fitness">Fitness</button>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Masonry Grid -->
    <div class="masonry-grid" id="masonryGrid">
      <!-- Cards injected by JS -->
    </div>

    <!-- Loading Spinner -->
    <div class="loader-wrap" id="loaderWrap">
      <div class="spinner"></div>
      <p>Loading more ideas…</p>
    </div>

  </main>

  <!-- ===== PIN DETAIL MODAL ===== -->
  <div class="modal-overlay" id="pinModal">
    <div class="pin-modal-inner">
      <button class="modal-close" id="closePinModal"><i class="fa-solid fa-xmark"></i></button>
      <div class="pin-modal-left">
        <img src="" alt="" id="modalImage" class="modal-img"/>
      </div>
      <div class="pin-modal-right">
        <div class="modal-actions">
          <button class="save-btn" id="modalSaveBtn">Save</button>
          <div class="modal-icon-row">
            <button class="icon-btn-sm" title="More options"><i class="fa-solid fa-ellipsis"></i></button>
            <button class="icon-btn-sm" title="Share"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
          </div>
        </div>
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-user">
          <img src="" alt="" id="modalUserAvatar" class="modal-avatar"/>
          <div>
            <p class="modal-username" id="modalUsername"></p>
            <p class="modal-followers" id="modalFollowers"></p>
          </div>
          <button class="follow-btn" id="modalFollowBtn">Follow</button>
        </div>
        <div class="modal-tags" id="modalTags"></div>
        <div class="comments-section">
          <h4>Comments</h4>
          <div class="comments-list" id="modalComments"></div>
          <div class="add-comment">
            <img src="https://i.pravatar.cc/32?img=47" alt="You" class="comment-avatar"/>
            <input type="text" placeholder="Add a comment…" class="comment-input" id="commentInput"/>
            <button class="comment-send" id="commentSend"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== CREATE PIN MODAL ===== -->
  <div class="modal-overlay" id="createModal">
    <div class="create-modal-inner">
      <button class="modal-close" id="closeCreateModal"><i class="fa-solid fa-xmark"></i></button>
      <h2 class="create-title">Create a Pin</h2>
      <div class="create-body">
        <div class="create-upload" id="createUpload">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>Drag and drop or click to upload</p>
            <span>Recommended: 1000×1500px JPG/PNG</span>
            <input type="file" id="fileInput" accept="image/*" hidden/>
          </div>
          <img id="previewImage" class="preview-img" style="display:none" alt="Preview"/>
        </div>
        <div class="create-form">
          <label>Title</label>
          <input type="text" class="form-input" id="pinTitle" placeholder="Add a title"/>
          <label>Description</label>
          <textarea class="form-textarea" id="pinDesc" placeholder="Add a description…" rows="4"></textarea>
          <label>Link</label>
          <input type="url" class="form-input" id="pinLink" placeholder="https://…"/>
          <label>Board</label>
          <select class="form-select" id="pinBoard">
            <option>Choose a board</option>
            <option>Favourites</option>
            <option>Design Inspo</option>
            <option>Travel Goals</option>
            <option>Food & Recipes</option>
          </select>
          <button class="publish-btn" id="publishBtn">Publish</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ===== BACK TO TOP ===== -->
  <button class="back-top" id="backTop" title="Back to top">
    <i class="fa-solid fa-chevron-up"></i>
  </button>

  <script src="js/main.js"></script>
</body>
</html>
